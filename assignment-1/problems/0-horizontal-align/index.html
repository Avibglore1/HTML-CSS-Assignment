<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertical Center</title>

<style>
html, body{
    height:100%;
    margin:0;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:1200px;
    background:red;
    text-align:center;
}

.content{
    height:500px;
}
</style>

</head>

<body>

<div class="container">
    <div class="content">
        <h1>Hello World</h1>
    </div>
</div>

</body>
</html>
